questions:
  - id: Q001
    pregunta: "Debe haber homogeneidad de formato en el tamano de letras entre titulos y subtitulos."
    tipo_check: layout_visual
    metodo: font_size_consistency
    umbral_confianza: 0.85
    requiere_llm: false
    severidad: media
    ambito: global
    nivel_pipeline: llm_visual
    evidencia_minima: 1
    output_type: scored_review
    expected_evidence: visual_observation
    escala: [ok, dudoso, no_ok]
    aplicabilidad:
      tipos_documento: [global]

  - id: Q002
    pregunta: "Deben haber marcadores en el documento."
    tipo_check: document_structure
    metodo: bookmark_presence
    umbral_confianza: 0.95
    requiere_llm: false
    severidad: alta
    ambito: global
    nivel_pipeline: determinista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: bookmark_list
    aplicabilidad:
      tipos_documento: [global]

  - id: Q003
    pregunta: "No debe aparecer ningun error de marcadores no definidos."
    tipo_check: pattern_rule
    metodo: forbidden_marker_error_scan
    umbral_confianza: 0.99
    requiere_llm: false
    severidad: alta
    ambito: global
    nivel_pipeline: determinista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: text_span
    aplicabilidad:
      tipos_documento: [global]

  - id: Q004
    pregunta: "Debe aparecer el bloque de firmas al final del documento."
    tipo_check: document_structure
    metodo: signature_block_at_end
    umbral_confianza: 0.8
    requiere_llm: false
    severidad: alta
    ambito: cierre_documental
    nivel_pipeline: semideterminista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: page_region
    aplicabilidad:
      tipos_documento: [memoria, plan_marco, plan_obra, presupuesto_pca, pptp, presupuesto]

  - id: Q005
    pregunta: "La fecha de entrega de la portada debe coincidir con la fecha de firmas cuando existan firmas."
    tipo_check: cross_field_consistency
    metodo: compare_cover_and_signature_dates
    umbral_confianza: 0.8
    requiere_llm: false
    severidad: alta
    ambito: trazabilidad
    nivel_pipeline: semideterminista
    evidencia_minima: 2
    output_type: boolean
    expected_evidence: extracted_fields
    aplicabilidad:
      tipos_documento: [memoria, plan_marco, plan_obra, presupuesto_pca, pptp, presupuesto]
      aplica_si: "hay_firmas = true"

  - id: Q006
    pregunta: "Debe incluirse la portada al documento."
    tipo_check: document_structure
    metodo: cover_page_detection
    umbral_confianza: 0.9
    requiere_llm: false
    severidad: alta
    ambito: apertura_documental
    nivel_pipeline: determinista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: page_region
    aplicabilidad:
      tipos_documento: [global]

  - id: Q007
    pregunta: "No debe haber hojas en blanco."
    tipo_check: layout_visual
    metodo: blank_page_detection
    umbral_confianza: 0.98
    requiere_llm: false
    severidad: media
    ambito: global
    nivel_pipeline: determinista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: page_list
    aplicabilidad:
      tipos_documento: [global]

  - id: Q008
    pregunta: "No debe haber errores de paginacion; la pagina 1 es la primera despues del indice."
    tipo_check: document_structure
    metodo: pagination_consistency_after_index
    umbral_confianza: 0.75
    requiere_llm: false
    severidad: media
    ambito: estructura
    nivel_pipeline: semideterminista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: pagination_trace
    aplicabilidad:
      tipos_documento: [global]

  - id: Q009
    pregunta: "No debe aparecer ninguna referencia a GPO."
    tipo_check: pattern_rule
    metodo: forbidden_term_scan
    umbral_confianza: 0.99
    requiere_llm: false
    severidad: alta
    ambito: global
    nivel_pipeline: determinista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: text_span
    aplicabilidad:
      tipos_documento: [global]

  - id: Q010
    pregunta: "Los criterios de formato deben seguir la NAG aplicable."
    tipo_check: external_normative_check
    metodo: nag_format_compliance
    umbral_confianza: 0.65
    requiere_llm: true
    severidad: alta
    ambito: normativo
    nivel_pipeline: llm_visual
    evidencia_minima: 1
    output_type: warning
    expected_evidence: normative_gap_note
    aplicabilidad:
      tipos_documento: [global]
      aplica_si: "norma_externa_disponible = true"
      no_aplica_si: "norma_externa_disponible = false"

  - id: Q011
    pregunta: "Si existen apendices, deben estar adjuntos al documento."
    tipo_check: document_structure
    metodo: appendix_attachment_consistency
    umbral_confianza: 0.7
    requiere_llm: false
    severidad: media
    ambito: anexos
    nivel_pipeline: semideterminista
    evidencia_minima: 1
    output_type: boolean
    expected_evidence: appendix_reference
    aplicabilidad:
      tipos_documento: [global]
      aplica_si: "hay_apendices = true"

  - id: Q012
    pregunta: "No aparecen errores ortograficos."
    tipo_check: semantic_judgment
    metodo: spelling_error_detection
    umbral_confianza: 0.7
    requiere_llm: true
    severidad: media
    ambito: calidad_textual
    nivel_pipeline: llm_visual
    evidencia_minima: 1
    output_type: scored_review
    expected_evidence: text_span
    escala: [ok, dudoso, no_ok]
    aplicabilidad:
      tipos_documento: [global]

  - id: Q013
    pregunta: "Las imagenes y las formulas son perfectamente legibles."
    tipo_check: layout_visual
    metodo: image_formula_legibility_review
    umbral_confianza: 0.6
    requiere_llm: true
    severidad: media
    ambito: calidad_visual
    nivel_pipeline: llm_visual
    evidencia_minima: 1
    output_type: scored_review
    expected_evidence: visual_observation
    escala: [ok, dudoso, no_ok]
    aplicabilidad:
      tipos_documento: [global]

  - id: Q014
    pregunta: "No existen referencias a otros proyectos fuera de antecedentes."
    tipo_check: semantic_judgment
    metodo: out_of_scope_project_reference_scan
    umbral_confianza: 0.7
    requiere_llm: true
    severidad: alta
    ambito: consistencia_semantica
    nivel_pipeline: llm_visual
    evidencia_minima: 1
    output_type: warning
    expected_evidence: text_span
    aplicabilidad:
      tipos_documento: [global]

  - id: Q015
    pregunta: "Extraer el titulo del documento."
    tipo_check: document_structure
    metodo: document_title_extraction
    umbral_confianza: 0.9
    requiere_llm: false
    severidad: baja
    ambito: metadata
    nivel_pipeline: determinista
    evidencia_minima: 1
    output_type: extracted_value
    expected_evidence: extracted_field
    aplicabilidad:
      tipos_documento: [global]
